<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Air Draw – Magic Canvas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Space+Mono&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0a0a0f;
      --panel: #12121a;
      --accent: #00ffe0;
      --warn: #ff4b6e;
      --text: #e0e0f0;
      --dim: #44445a
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    #top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 14px;
      background: var(--panel);
      border-bottom: 1px solid #1e1e30;
      z-index: 10;
      flex-shrink: 0
    }

    #top-bar h1 {
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase
    }

    #mode-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      padding: 3px 11px;
      border-radius: 20px;
      background: #1a1a2a;
      border: 1px solid var(--dim);
      color: var(--text);
      transition: all 0.2s;
      letter-spacing: 1px
    }

    #mode-badge.drawing {
      background: rgba(0, 255, 224, 0.15);
      border-color: var(--accent);
      color: var(--accent)
    }

    #mode-badge.stopped {
      background: rgba(255, 75, 110, 0.12);
      border-color: var(--warn);
      color: var(--warn)
    }

    #mode-badge.selecting {
      background: rgba(255, 230, 0, 0.12);
      border-color: #ffe600;
      color: #ffe600
    }

    #hint {
      font-size: 0.68rem;
      color: var(--dim);
      margin-left: auto;
      letter-spacing: 1px
    }

    /* word input box */
    #word-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px
    }

    #word-input-wrap label {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap
    }

    #word-input {
      background: #1a1a2a;
      border: 1px solid var(--dim);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 4px;
      width: 110px;
      outline: none;
      transition: border-color 0.2s
    }

    #word-input:focus {
      border-color: var(--accent)
    }

    #word-go {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s
    }

    #word-go:hover {
      background: var(--accent);
      color: #000
    }

    #main {
      flex: 1;
      position: relative;
      overflow: hidden
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      filter: brightness(1.35) contrast(1.1) saturate(1.15);
      opacity: 0.88
    }

    #draw-canvas,
    #overlay-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none
    }

    #palette {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: linear-gradient(to top, rgba(8, 8, 14, 0.97) 60%, rgba(8, 8, 14, 0.7));
      backdrop-filter: blur(10px);
      border-top: 1px solid #1e1e30;
      z-index: 5
    }

    .swatch {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      border: 3px solid transparent;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s
    }

    .swatch.active {
      border-color: white !important;
      transform: scale(1.3);
      box-shadow: 0 0 18px var(--glow, white), 0 0 6px white
    }

    .swatch.hover-highlight {
      border-color: rgba(255, 255, 255, 0.7) !important;
      transform: scale(1.18);
      box-shadow: 0 0 20px var(--glow, white)
    }

    .swatch[data-name="Eraser"] {
      background: #2a2a3a;
      border-color: #555 !important;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center
    }

    #brush-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      margin-left: 10px
    }

    #brush-wrap label {
      font-size: 0.58rem;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase
    }

    #brush-range {
      width: 64px;
      accent-color: var(--accent);
      cursor: pointer
    }

    #clear-btn {
      margin-left: 8px;
      background: transparent;
      border: 1px solid var(--warn);
      color: var(--warn);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s
    }

    #clear-btn:hover {
      background: var(--warn);
      color: #fff
    }

    #color-tooltip {
      position: absolute;
      bottom: 82px;
      background: rgba(10, 10, 20, 0.92);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 20
    }

    #color-tooltip.show {
      opacity: 1
    }

    .air-object {
      position: absolute;
      pointer-events: none;
      user-select: none;
      transition: filter 0.2s, transform 0.2s;
      z-index: 6;
      border-radius: 50%;
      border: 3px solid rgba(0, 255, 224, 0.5);
      object-fit: cover
    }

    .air-object.grabbed {
      filter: drop-shadow(0 0 18px var(--accent)) brightness(1.2);
      transform: scale(1.05)
    }

    #word-flash {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 5px;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      text-shadow: 0 0 24px var(--accent);
      z-index: 20
    }

    /* OCR scanning indicator */
    #scan-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      opacity: 0;
      pointer-events: none;
      z-index: 25;
      transition: opacity 0.3s
    }

    #scan-ring.show {
      opacity: 1;
      animation: scanpulse 0.6s ease-in-out 3
    }

    @keyframes scanpulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1
      }

      50% {
        transform: translate(-50%, -50%) scale(1.4);
        opacity: 0.4
      }
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 14px
    }

    #loading-screen h2 {
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 4px
    }

    #loading-screen p {
      font-size: 0.8rem;
      color: var(--dim);
      font-family: 'Space Mono', monospace
    }

    .loader {
      width: 44px;
      height: 44px;
      border: 3px solid var(--dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>

  <div id="loading-screen">
    <div class="loader"></div>
    <h2>AIR DRAW</h2>
    <p id="load-msg">Loading hand tracking…</p>
  </div>

  <div id="top-bar">
    <h1>✦ Air Draw</h1>
    <div id="mode-badge">– no hand</div>
    <div id="word-input-wrap">
      <label>SUMMON:</label>
      <input id="word-input" type="text" placeholder="globe, cat…" autocomplete="off" spellcheck="false">
      <button id="word-go">GO</button>
    </div>
    <span id="hint">☝ 1 finger=draw &nbsp;|&nbsp; ✌ 2 fingers=stop &nbsp;|&nbsp; 🤏 pinch color=select &nbsp;|&nbsp; ✋
      palm=grab</span>
  </div>

  <div id="main">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="draw-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
    <div id="word-flash"></div>
    <div id="scan-ring"></div>
    <div id="color-tooltip"></div>
    <div id="palette"></div>
  </div>

  <!-- Tesseract OCR (runs fully in browser, no API key) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"
    crossorigin="anonymous"></script>

  <script>
    // ═══════════════ PALETTE ═══════════════
    const COLORS = [
      { name: 'Red', hex: '#ff3355' },
      { name: 'Orange', hex: '#ff8c00' },
      { name: 'Yellow', hex: '#ffe600' },
      { name: 'Lime', hex: '#39ff14' },
      { name: 'Cyan', hex: '#00ffe0' },
      { name: 'Blue', hex: '#3d9bff' },
      { name: 'Purple', hex: '#b44fff' },
      { name: 'Pink', hex: '#ff70c8' },
      { name: 'White', hex: '#ffffff' },
    ];

    const MAGIC_WORDS = {
      globe: 'earth globe planet', earth: 'earth planet space', sun: 'sun solar star',
      moon: 'moon lunar night sky', cat: 'cat cute kitten', dog: 'dog puppy cute',
      lion: 'lion wild africa', tiger: 'tiger wild jungle', elephant: 'elephant wildlife',
      bird: 'colorful bird flying', fish: 'fish underwater coral', butterfly: 'butterfly colorful wings',
      flower: 'flower bloom colorful', tree: 'tree nature green forest', fire: 'fire flame orange',
      water: 'water splash blue ocean', star: 'star space galaxy nebula', rocket: 'rocket space launch',
      car: 'sports car fast red', boat: 'boat sea ocean', house: 'house building architecture',
      heart: 'heart love red', apple: 'apple fruit red', pizza: 'pizza food italian',
      mountain: 'mountain peak snow landscape', ocean: 'ocean sea waves', rainbow: 'rainbow colorful sky',
      dragon: 'dragon fantasy creature', horse: 'horse running wild', snake: 'snake reptile',
      robot: 'robot futuristic', crown: 'crown gold royal', ball: 'colorful ball sport',
      bike: 'bicycle cycling', plane: 'airplane sky flying', ship: 'ship ocean sailing',
      bear: 'bear animal wildlife', fox: 'fox animal orange', wolf: 'wolf animal wild',
      owl: 'owl bird night', shark: 'shark ocean underwater', whale: 'whale ocean blue',
    };

    // ═══════════════ DOM ═══════════════
    const mainEl = document.getElementById('main');
    const drawCV = document.getElementById('draw-canvas');
    const overlCV = document.getElementById('overlay-canvas');
    const dctx = drawCV.getContext('2d');
    const octx = overlCV.getContext('2d');
    const videoEl = document.getElementById('video');
    const modeBadge = document.getElementById('mode-badge');
    const wordFlash = document.getElementById('word-flash');
    const scanRing = document.getElementById('scan-ring');
    const tooltip = document.getElementById('color-tooltip');
    const paletteEl = document.getElementById('palette');
    const wordInput = document.getElementById('word-input');
    const wordGo = document.getElementById('word-go');

    function resize() {
      const W = mainEl.clientWidth, H = mainEl.clientHeight;
      [drawCV, overlCV].forEach(c => { c.width = W; c.height = H });
    }
    window.addEventListener('resize', resize);
    resize();

    // ═══════════════ BUILD PALETTE ═══════════════
    let selColor = 0;
    COLORS.forEach((c, i) => {
      const sw = document.createElement('div');
      sw.className = 'swatch' + (i === 0 ? ' active' : '');
      sw.style.background = c.hex;
      sw.style.setProperty('--glow', c.hex);
      sw.dataset.idx = i; sw.dataset.name = c.name; sw.title = c.name;
      paletteEl.appendChild(sw);
    });
    const eraserSw = document.createElement('div');
    eraserSw.className = 'swatch'; eraserSw.dataset.idx = -1; eraserSw.dataset.name = 'Eraser';
    eraserSw.innerHTML = '⌫'; paletteEl.appendChild(eraserSw);
    const bwrap = document.createElement('div'); bwrap.id = 'brush-wrap';
    bwrap.innerHTML = '<label>SIZE</label><input type="range" id="brush-range" min="3" max="36" value="10">';
    paletteEl.appendChild(bwrap);
    const cb = document.createElement('button'); cb.id = 'clear-btn'; cb.textContent = 'CLEAR'; paletteEl.appendChild(cb);

    let brushSize = 10;
    document.getElementById('brush-range').addEventListener('input', e => brushSize = +e.target.value);
    cb.addEventListener('click', clearAll);

    function selectColor(i) {
      selColor = i;
      document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', +s.dataset.idx === i));
    }
    document.querySelectorAll('.swatch').forEach(s => s.addEventListener('click', () => selectColor(+s.dataset.idx)));

    function clearAll() {
      dctx.clearRect(0, 0, drawCV.width, drawCV.height);
      strokePoints = [];
      airObjects.forEach(o => o.el.remove());
      airObjects = [];
    }

    // ═══════════════ DRAW STATE ═══════════════
    let smoothPt = null, prevPt = null, trail = [];
    const SMOOTH = 0.3;
    let strokePoints = [], wordTimer = null;
    let ocrRunning = false;

    function hexToRgba(hex, a) {
      const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function drawStroke(pts) {
      if (pts.length < 2) return;
      dctx.save();
      if (selColor === -1) {
        dctx.globalCompositeOperation = 'destination-out';
        dctx.strokeStyle = 'rgba(0,0,0,1)';
        dctx.lineWidth = brushSize * 5;
      } else {
        dctx.globalCompositeOperation = 'source-over';
        dctx.strokeStyle = hexToRgba(COLORS[selColor].hex, 0.94);
        dctx.lineWidth = brushSize;
      }
      dctx.lineCap = 'round'; dctx.lineJoin = 'round';
      dctx.beginPath(); dctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length - 1; i++) {
        const mx = (pts[i].x + pts[i + 1].x) / 2, my = (pts[i].y + pts[i + 1].y) / 2;
        dctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
      }
      dctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
      dctx.stroke(); dctx.restore();
    }

    // ═══════════════ OCR WORD RECOGNITION (Tesseract, fully in-browser) ═══════════════
    let tesseractWorker = null;

    async function initTesseract() {
      tesseractWorker = await Tesseract.createWorker('eng', 1, {
        logger: () => { }
      });
      await tesseractWorker.setParameters({
        tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',
        tessedit_pageseg_mode: '7', // single line
      });
    }

    function scheduleWordCheck() {
      clearTimeout(wordTimer);
      wordTimer = setTimeout(tryRecognizeWord, 1500);
    }

    async function tryRecognizeWord() {
      if (strokePoints.length < 20 || ocrRunning) { strokePoints = []; return; }
      if (!tesseractWorker) { strokePoints = []; return; }
      ocrRunning = true;

      // crop to just the drawn region + padding
      const xs = strokePoints.map(p => p.x), ys = strokePoints.map(p => p.y);
      const pad = 30;
      const x1 = Math.max(0, Math.min(...xs) - pad), y1 = Math.max(0, Math.min(...ys) - pad);
      const x2 = Math.min(drawCV.width, Math.max(...xs) + pad), y2 = Math.min(drawCV.height, Math.max(...ys) + pad);

      // make a temp canvas: white bg, black strokes (better for OCR)
      const tmp = document.createElement('canvas');
      tmp.width = x2 - x1; tmp.height = y2 - y1;
      const tc = tmp.getContext('2d');
      tc.fillStyle = '#ffffff'; tc.fillRect(0, 0, tmp.width, tmp.height);
      // draw the region from draw canvas onto white bg in black
      tc.filter = 'invert(1) grayscale(1)';
      tc.drawImage(drawCV, x1, y1, x2 - x1, y2 - y1, 0, 0, tmp.width, tmp.height);

      // show scan indicator
      scanRing.classList.add('show');

      strokePoints = [];

      try {
        const { data } = await tesseractWorker.recognize(tmp);
        const raw = data.text.trim().toLowerCase().replace(/[^a-z]/g, '');
        scanRing.classList.remove('show');
        // try full word, then progressively shorter
        let matched = null;
        for (const key of Object.keys(MAGIC_WORDS)) {
          if (raw.includes(key)) { matched = key; break; }
        }
        if (matched) {
          flashWord(matched);
          spawnImage(matched);
        }
      } catch (e) {
        scanRing.classList.remove('show');
      }
      ocrRunning = false;
    }

    // ═══════════════ MANUAL WORD INPUT ═══════════════
    function tryManualWord() {
      const w = wordInput.value.trim().toLowerCase().replace(/[^a-z]/g, '');
      wordInput.value = '';
      if (MAGIC_WORDS[w]) {
        flashWord(w);
        spawnImage(w);
      } else {
        // still try: spawn with the word itself as search
        if (w.length > 1) {
          flashWord(w);
          spawnImageRaw(w, w);
        }
      }
    }
    wordGo.addEventListener('click', tryManualWord);
    wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryManualWord(); });

    // ═══════════════ FLASH & SPAWN ═══════════════
    function flashWord(word) {
      wordFlash.textContent = '✦ ' + word.toUpperCase() + ' ✦';
      wordFlash.style.opacity = '1';
      setTimeout(() => { wordFlash.style.opacity = '0'; }, 1800);
    }

    let airObjects = [], grabbedObj = null, grabOffX = 0, grabOffY = 0;

    function spawnImage(word) {
      spawnImageRaw(word, MAGIC_WORDS[word]);
    }

    function spawnImageRaw(word, query) {
      const q = encodeURIComponent(query);
      const seed = Math.floor(Math.random() * 900) + 1;
      // Primary: Unsplash source (free, no key needed)
      const src = `https://source.unsplash.com/220x220/?${q}&sig=${seed}`;
      placeImage(src, word, seed);
    }

    function placeImage(src, word, seed) {
      const size = 160 + Math.random() * 100;
      // place in mainEl CSS space (what obj.x/y track)
      const mr = mainEl.getBoundingClientRect();
      const x = mr.width * 0.2 + Math.random() * mr.width * 0.55;
      const y = mr.height * 0.1 + Math.random() * mr.height * 0.48;

      const el = document.createElement('img');
      el.className = 'air-object';
      el.style.cssText = `width:${size}px;height:${size}px;left:${x - size / 2}px;top:${y - size / 2}px;opacity:0;transform:scale(0.3) rotate(-8deg);transition:opacity 0.5s,transform 0.5s;`;
      el.alt = word;
      el.onerror = () => {
        if (!el._tried2) {
          el._tried2 = true;
          el.src = `https://loremflickr.com/220/220/${encodeURIComponent(word)}?random=${seed}`;
        }
      };
      el.src = src;
      mainEl.appendChild(el);
      requestAnimationFrame(() => {
        el.style.opacity = '1';
        el.style.transform = 'scale(1) rotate(0deg)';
      });
      airObjects.push({ el, x: x - size / 2, y: y - size / 2, w: size, h: size });
    }

    // ═══════════════ GESTURES ═══════════════
    function lmPx(lm) { return { x: (1 - lm.x) * drawCV.width, y: lm.y * drawCV.height }; }
    function normDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function fingerUp(lms, tip, pip) { return lms[tip].y < lms[pip].y - 0.025; }

    function getGesture(lms) {
      const iUp = fingerUp(lms, 8, 6), mUp = fingerUp(lms, 12, 10);
      const rUp = fingerUp(lms, 16, 14), pUp = fingerUp(lms, 20, 18);
      const pinch = normDist(lms[8], lms[4]) < 0.065;
      const palm = iUp && mUp && rUp && pUp;
      if (palm) return 'palm';
      if (pinch) return 'pinch';
      if (iUp && mUp && !rUp && !pUp) return 'two';
      if (iUp && !mUp && !rUp && !pUp) return 'draw';
      return 'none';
    }

    let lastPinchSwatch = null;

    function checkPinchOnPalette(tipPx) {
      const rect = overlCV.getBoundingClientRect();
      const px = tipPx.x * (rect.width / drawCV.width) + rect.left;
      const py = tipPx.y * (rect.height / drawCV.height) + rect.top;
      let found = null;
      document.querySelectorAll('.swatch').forEach(sw => {
        const r = sw.getBoundingClientRect();
        if (px >= r.left && px <= r.right && py >= r.top && py <= r.bottom) found = sw;
      });
      if (found && found !== lastPinchSwatch) {
        lastPinchSwatch = found;
        selectColor(+found.dataset.idx);
        showTooltip(found);
      }
      if (!found) lastPinchSwatch = null;
    }

    function checkHoverOnPalette(tipPx) {
      const rect = overlCV.getBoundingClientRect();
      const px = tipPx.x * (rect.width / drawCV.width) + rect.left;
      const py = tipPx.y * (rect.height / drawCV.height) + rect.top;
      let hovered = null;
      document.querySelectorAll('.swatch').forEach(sw => {
        const r = sw.getBoundingClientRect();
        const near = px >= r.left - 12 && px <= r.right + 12 && py >= r.top - 14 && py <= r.bottom + 14;
        sw.classList.toggle('hover-highlight', near && !sw.classList.contains('active'));
        if (near) hovered = sw;
      });
      if (hovered) showTooltip(hovered);
      else tooltip.classList.remove('show');
    }

    function showTooltip(sw) {
      const r = sw.getBoundingClientRect();
      tooltip.textContent = sw.dataset.name;
      tooltip.style.left = (r.left + r.width / 2 - 40) + 'px';
      tooltip.classList.add('show');
      clearTimeout(tooltip._t);
      tooltip._t = setTimeout(() => tooltip.classList.remove('show'), 1200);
    }

    function canvasToMain(pt) {
      const cr = overlCV.getBoundingClientRect();
      const mr = mainEl.getBoundingClientRect();
      return {
        x: pt.x * (cr.width / drawCV.width) + (cr.left - mr.left),
        y: pt.y * (cr.height / drawCV.height) + (cr.top - mr.top),
      };
    }

    function checkGrab(palmPt, active) {
      const mp = canvasToMain(palmPt);
      if (active) {
        if (!grabbedObj) {
          let best = null, bestD = Infinity;
          for (const obj of airObjects) {
            const cx = obj.x + obj.w / 2, cy = obj.y + obj.h / 2;
            const d = Math.hypot(mp.x - cx, mp.y - cy);
            if (d < obj.w * 0.9 && d < bestD) { bestD = d; best = obj; }
          }
          if (best) {
            grabbedObj = best;
            grabOffX = mp.x - (best.x + best.w / 2);
            grabOffY = mp.y - (best.y + best.h / 2);
            best.el.classList.add('grabbed');
          }
        } else {
          const nx = mp.x - grabOffX - grabbedObj.w / 2;
          const ny = mp.y - grabOffY - grabbedObj.h / 2;
          grabbedObj.x = nx; grabbedObj.y = ny;
          grabbedObj.el.style.left = nx + 'px';
          grabbedObj.el.style.top = ny + 'px';
        }
      } else {
        if (grabbedObj) { grabbedObj.el.classList.remove('grabbed'); grabbedObj = null; }
      }
    }

    // ═══════════════ MEDIAPIPE CALLBACK ═══════════════
    function onResults(results) {
      octx.clearRect(0, 0, overlCV.width, overlCV.height);
      if (!results.multiHandLandmarks?.length) {
        smoothPt = null; prevPt = null; trail = [];
        modeBadge.textContent = '– no hand'; modeBadge.className = 'mode-badge';
        if (grabbedObj) { grabbedObj.el.classList.remove('grabbed'); grabbedObj = null; }
        return;
      }
      const lms = results.multiHandLandmarks[0];
      const gesture = getGesture(lms);
      const tipRaw = lmPx(lms[8]);
      const palmPt = lmPx(lms[9]);  // lms[9]=middle-finger MCP = true palm centre

      if (!smoothPt) smoothPt = { ...tipRaw };
      smoothPt.x += (tipRaw.x - smoothPt.x) * SMOOTH;
      smoothPt.y += (tipRaw.y - smoothPt.y) * SMOOTH;
      const tip = { x: smoothPt.x, y: smoothPt.y };

      const inPalette = tip.y > overlCV.height - 82;
      checkHoverOnPalette(tip);

      if (gesture === 'palm') {
        checkGrab(palmPt, true);
        prevPt = null; trail = [];
        modeBadge.textContent = '✋ grabbing'; modeBadge.className = 'mode-badge';
        drawCursor(tip, 'palm'); return;
      }
      checkGrab(palmPt, false);

      if (gesture === 'pinch') {
        checkPinchOnPalette(tip);
        prevPt = null; trail = [];
        modeBadge.textContent = '🤏 selecting'; modeBadge.className = 'mode-badge selecting';
        drawCursor(tip, 'pinch'); return;
      }

      if (gesture === 'two') {
        prevPt = null; trail = [];
        modeBadge.textContent = '✌ stopped'; modeBadge.className = 'mode-badge stopped';
        drawCursor(tip, 'stop'); return;
      }

      if (gesture === 'draw' && !inPalette) {
        modeBadge.textContent = '☝ drawing'; modeBadge.className = 'mode-badge drawing';
        trail.push({ ...tip });
        if (trail.length > 8) trail.shift();
        if (prevPt) {
          drawStroke(trail);
          strokePoints.push({ ...tip });
          scheduleWordCheck();
        }
        prevPt = { ...tip };
        drawCursor(tip, 'draw'); return;
      }

      prevPt = null; trail = [];
      modeBadge.textContent = '☝ hover'; modeBadge.className = 'mode-badge';
      drawCursor(tip, 'hover');
    }

    // ═══════════════ OVERLAY CURSOR ═══════════════
    function drawCursor(pt, mode) {
      octx.save(); octx.lineCap = 'round';
      if (mode === 'draw') {
        const col = selColor >= 0 ? COLORS[selColor].hex : '#ffffff';
        octx.fillStyle = col; octx.shadowColor = col; octx.shadowBlur = 16;
        octx.beginPath(); octx.arc(pt.x, pt.y, Math.max(4, brushSize / 2 + 2), 0, Math.PI * 2); octx.fill();
        octx.strokeStyle = 'rgba(255,255,255,0.4)'; octx.lineWidth = 1.5; octx.shadowBlur = 0;
        octx.beginPath(); octx.arc(pt.x, pt.y, Math.max(4, brushSize / 2 + 9), 0, Math.PI * 2); octx.stroke();
      } else if (mode === 'stop') {
        octx.strokeStyle = 'rgba(255,75,110,0.85)'; octx.lineWidth = 2.5;
        const r = 16;
        octx.beginPath();
        octx.moveTo(pt.x - r, pt.y - r); octx.lineTo(pt.x + r, pt.y + r);
        octx.moveTo(pt.x + r, pt.y - r); octx.lineTo(pt.x - r, pt.y + r);
        octx.stroke();
      } else if (mode === 'pinch') {
        octx.strokeStyle = '#ffe600'; octx.lineWidth = 2; octx.setLineDash([4, 4]);
        octx.beginPath(); octx.arc(pt.x, pt.y, 18, 0, Math.PI * 2); octx.stroke(); octx.setLineDash([]);
      } else if (mode === 'palm') {
        octx.strokeStyle = 'rgba(0,255,224,0.7)'; octx.lineWidth = 2;
        octx.beginPath(); octx.arc(pt.x, pt.y, 28, 0, Math.PI * 2); octx.stroke();
        octx.fillStyle = 'rgba(0,255,224,0.07)'; octx.fill();
      } else {
        const col = selColor >= 0 ? COLORS[selColor].hex : '#aaa';
        octx.strokeStyle = col; octx.lineWidth = 1.5; octx.globalAlpha = 0.7;
        const r = 13;
        octx.beginPath();
        octx.moveTo(pt.x - r, pt.y); octx.lineTo(pt.x + r, pt.y);
        octx.moveTo(pt.x, pt.y - r); octx.lineTo(pt.x, pt.y + r);
        octx.stroke();
        octx.beginPath(); octx.arc(pt.x, pt.y, 5, 0, Math.PI * 2); octx.stroke();
      }
      octx.restore();
    }

    // ═══════════════ INIT ═══════════════
    async function init() {
      const msg = document.getElementById('load-msg');
      msg.textContent = 'Starting OCR engine…';
      await initTesseract();

      msg.textContent = 'Requesting camera…';
      const hands = new Hands({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
      });
      hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.65 });
      hands.onResults(onResults);

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'user' } });
        videoEl.srcObject = stream; await videoEl.play();
      } catch (e) { msg.textContent = '❌ Camera denied. Allow camera and reload.'; return; }

      msg.textContent = 'Warming up tracker…';
      const cam = new Camera(videoEl, {
        onFrame: async () => { await hands.send({ image: videoEl }); },
        width: 1280, height: 720
      });
      await cam.start();
      document.getElementById('loading-screen').style.display = 'none';
    }

    init();
  </script>
</body>

</html>
